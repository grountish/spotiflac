<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Kaleidoscoped Spotify logo">
  <defs>
    <style>
      .bg{fill:#191414}
      .accent{fill:#1ed760}
      .ring{fill:none;stroke:#1ed760;stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
      .wave{fill:none;stroke:#1ed760;stroke-width:18;stroke-linecap:round}
    </style>
  </defs>

  <circle class="bg" cx="256" cy="256" r="236"/>
  <circle class="ring" cx="256" cy="256" r="170" opacity="0.9"/>
  <circle class="ring" cx="256" cy="256" r="124" opacity="0.55"/>

  <g transform="translate(256 256)">
    <g id="petal">
      <path class="accent" d="M0-204C18-182 31-155 31-126C31-97 18-70 0-48C-18-70-31-97-31-126C-31-155-18-182 0-204Z"/>
      <path class="bg" opacity="0.18" d="M0-182C11-168 18-149 18-130C18-111 11-92 0-78C-11-92-18-111-18-130C-18-149-11-168 0-182Z"/>
    </g>
    <use href="#petal" transform="rotate(45)"/>
    <use href="#petal" transform="rotate(90)"/>
    <use href="#petal" transform="rotate(135)"/>
    <use href="#petal" transform="rotate(180)"/>
    <use href="#petal" transform="rotate(225)"/>
    <use href="#petal" transform="rotate(270)"/>
    <use href="#petal" transform="rotate(315)"/>

    <g id="spark">
      <circle class="accent" cx="0" cy="-212" r="8"/>
    </g>
    <use href="#spark" transform="rotate(22.5)" opacity="0.85"/>
    <use href="#spark" transform="rotate(67.5)" opacity="0.85"/>
    <use href="#spark" transform="rotate(112.5)" opacity="0.85"/>
    <use href="#spark" transform="rotate(157.5)" opacity="0.85"/>
    <use href="#spark" transform="rotate(202.5)" opacity="0.85"/>
    <use href="#spark" transform="rotate(247.5)" opacity="0.85"/>
    <use href="#spark" transform="rotate(292.5)" opacity="0.85"/>
    <use href="#spark" transform="rotate(337.5)" opacity="0.85"/>
  </g>

  <circle cx="256" cy="256" r="92" class="bg"/>
  <circle cx="256" cy="256" r="96" class="ring" opacity="0.95"/>

  <path class="wave" d="M195 218C230 203 284 203 323 220"/>
  <path class="wave" d="M205 254C237 242 279 244 308 257" stroke-width="16"/>
  <path class="wave" d="M216 288C242 281 272 283 294 294" stroke-width="14"/>
</svg>
